services:
  backend:
    build:
      context: ./backend
    container_name: ps-jangki-backend
    restart: unless-stopped
    environment:
      PORT: 8774
      RUST_LOG: ${RUST_LOG:-info}
    expose:
      - "8774"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8774/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ps-jangki

  frontend:
    build:
      context: ./frontend
    container_name: ps-jangki-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-18091}:80"
    networks:
      - ps-jangki

networks:
  ps-jangki:
    driver: bridge
